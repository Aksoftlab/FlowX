<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowX</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f5f5;
    color:#333;
}

/* Header */
.header{
    background:#009688;
    color:#fff;
    text-align:center;
    padding:18px 15px;
    border-radius:0 0 22px 22px;
    box-shadow:0 3px 12px rgba(0,0,0,.15);
}

.header h1{
    font-size:32px;
    font-weight:700;
    letter-spacing:.5px;
}

.header p{
    margin-top:4px;
    font-size:13px;
    opacity:.95;
}

/* Container */
.container{
    width:100%;
    max-width:1000px;
    margin:20px auto;
    padding:0 15px;
}

/* Image Card */
.image-card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,.12);
}

.image-card img{
    display:block;
    width:100%;
    height:auto;
}

/* Tablet */
@media (max-width:768px){

.header{
    padding:16px 12px;
}

.header h1{
    font-size:28px;
}

.header p{
    font-size:12px;
}

.container{
    margin:15px auto;
    padding:0 12px;
}

}

/* Mobile */
@media (max-width:480px){

.header{
    padding:14px 10px;
    border-radius:0 0 18px 18px;
}

.header h1{
    font-size:24px;
}

.header p{
    font-size:11px;
}

.container{
    margin:12px auto;
    padding:0 10px;
}

.image-card{
    border-radius:14px;
}

}
</style>

</head>
<body>

<div class="header">
    <h1>FlowX</h1>
    <p>DRA'S #1 Field App</p>
</div>

<div class="container">
    <div class="image-card">
        <img src="https://raw.githubusercontent.com/Aksoftlab/FlowX/refs/heads/main/1783216041611.png" alt="FlowX">
    </div>
</div>

</body>
</html>
