<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowX</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffffff;
    color:#333;
}

.header{
    background:#009688;
    color:#fff;
    text-align:center;
    padding:35px 20px;
    border-radius:0 0 30px 30px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.header h1{
    font-size:42px;
    font-weight:bold;
    letter-spacing:1px;
}

.header p{
    margin-top:6px;
    font-size:15px;
    opacity:.9;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:25px;
}

.image-card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.12);
}

.image-card img{
    width:100%;
    height:auto;
    display:block;
}

@media(max-width:600px){

.header h1{
    font-size:34px;
}

.header p{
    font-size:13px;
}

.container{
    padding:15px;
}

}
</style>

</head>

<body>

<div class="header">
    <h1>FlowX</h1>
    <p>DRA'S #1 Field App</p>
</div>

<div class="container">

    <div class="image-card">
        <img src="https://raw.githubusercontent.com/Aksoftlab/FlowX/refs/heads/main/1783216041611.png" alt="FlowX Preview">
    </div>

</div>

</body>
</html>
